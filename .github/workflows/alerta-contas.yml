name: Alerta de Contas

on:
  schedule:
    - cron: '0 12 * * *'  # Todo dia às 9h Buenos Aires (UTC-3)
  workflow_dispatch:

jobs:
  alerta:
    runs-on: ubuntu-latest
    steps:
      - name: Verificar e enviar alerta
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 << 'PYEOF'
          import smtplib, datetime
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          import os

          BILLS = [
            ("AYSA",      1),
            ("Alquiler",  5),
            ("Faculdade", 10),
            ("Expensas",  10),
            ("AGIP",      10),
            ("iPlan",     16),
            ("Edesur",    27),
          ]

          MONTHS = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio",
                    "Agosto","Septiembre","Octubre","Noviembre","Diciembre"]

          tz = datetime.timezone(datetime.timedelta(hours=-3))
          now = datetime.datetime.now(tz)
          tomorrow = now + datetime.timedelta(days=1)
          tomorrow_day = tomorrow.day
          month_name = MONTHS[tomorrow.month - 1]

          vencendo = [(name, day) for name, day in BILLS if day == tomorrow_day]

          if not vencendo:
            print(f"Nenhuma conta vence amanhã (dia {tomorrow_day}).")
            exit(0)

          nomes = ", ".join(n for n, _ in vencendo)
          print(f"Vencendo amanhã: {nomes}")

          cards_html = ""
          for name, day in vencendo:
            cards_html += f"""
            <div style="background:rgba(255,180,50,0.06);border:1px solid rgba(255,180,50,0.25);border-radius:10px;padding:1rem 1.25rem;margin-bottom:0.75rem">
              <div style="font-size:0.65rem;font-family:monospace;color:rgba(232,228,216,0.35);margin-bottom:0.3rem">día {str(day).zfill(2)} · {month_name}</div>
              <div style="font-size:1.1rem;font-weight:700;color:#e8e4d8">{name}</div>
            </div>"""

          html = f"""<!DOCTYPE html>
          <html>
          <body style="font-family:sans-serif;background:#0a0a0f;padding:2rem;margin:0">
            <div style="max-width:460px;margin:0 auto;background:#111118;border:1px solid rgba(232,228,216,0.1);border-radius:16px;padding:2rem">
              <div style="font-size:2rem;margin-bottom:0.5rem">💰</div>
              <div style="font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(232,228,216,0.35);margin-bottom:0.5rem">Contas do Mês</div>
              <h2 style="margin:0 0 1.5rem;font-size:1.3rem;color:#fdb834">⚠ Vence amanhã</h2>
              {cards_html}
              <div style="margin-top:1.5rem;font-size:0.78rem;color:rgba(232,228,216,0.3);line-height:1.6">
                Acesse o site para marcar como paga:<br>
                <a href="https://memoriasdojoao.github.io/contas-para-pagar" style="color:#c8f060;text-decoration:none">memoriasdojoao.github.io/contas-para-pagar</a>
              </div>
            </div>
          </body>
          </html>"""

          sender = "joaovictorcruzsantos@gmail.com"
          recipients = ["joaovictorcruzsantos@gmail.com", "laislacarolinar@gmail.com"]
          password = os.environ["GMAIL_APP_PASSWORD"]

          msg = MIMEMultipart("alternative")
          msg["Subject"] = f"⚠️ Vence amanhã: {nomes}"
          msg["From"] = f"Contas do Mês <{sender}>"
          msg["To"] = ", ".join(recipients)
          msg.attach(MIMEText(html, "html"))

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
            server.login(sender, password)
            server.sendmail(sender, recipients, msg.as_string())
            print("✅ Email enviado com sucesso!")
          PYEOF
